packages:
  - apps/*
  - packages/*
  - design-system

allowBuilds:
  better-sqlite3: true
  esbuild: true
  spawn-sync: true

dedupePeers: true

ignoreWorkspaceRootCheck: true

minimumReleaseAgeExclude:
  - '@meowdown/*'
  - '@prosekit/*'
  - '@aria-ui/*'
  - prosemirror-flat-list
  - prosemirror-view

# Uncomment the "blockExoticSubdeps" and "overrides" sections below to install packages from pkg.pr.new
# TEMPORARY (drop once meowdown ships a release with prosekit/meowdown#251):
# MarkdownView task-checkbox interactivity for backlink snippets.
blockExoticSubdeps: false
overrides:
  '@meowdown/core': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/core@0adc3c4'
  '@meowdown/react': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/react@0adc3c4'
