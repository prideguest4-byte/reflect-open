packages:
  - apps/*
  - packages/*
  - design-system

allowBuilds:
  better-sqlite3: true
  esbuild: true
  spawn-sync: true

dedupePeers: true

ignoreWorkspaceRootCheck: true

minimumReleaseAgeExclude:
  - '@meowdown/*'
  - '@prosekit/*'
  - '@aria-ui/*'
  - virtua@0.49.2

# pkg.pr.new overrides — ACTIVE while a meowdown PR is pending upstream.
# TODO(ai-menu): temporary snapshot of prosekit/meowdown#191 (selection menu +
# pending replacement); once it ships in a meowdown release, bump the
# apps/desktop dependency instead and re-comment this block.
blockExoticSubdeps: false
overrides:
  '@meowdown/core': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/core@ca6a7d4'
  '@meowdown/react': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/react@ca6a7d4'
