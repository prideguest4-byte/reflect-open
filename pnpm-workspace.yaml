packages:
  - apps/*
  - packages/*
  - design-system

allowBuilds:
  better-sqlite3: true
  esbuild: true
  spawn-sync: true

dedupePeers: true

ignoreWorkspaceRootCheck: true

minimumReleaseAgeExclude:
  - '@meowdown/*'
  - '@prosekit/*'
  - '@aria-ui/*'
  - virtua@0.49.2

# pkg.pr.new pin for prosekit/meowdown#192 (insertMarkdown + host slash-menu
# items) — swap for the real @meowdown/* version bump once it releases.
blockExoticSubdeps: false
overrides:
  '@meowdown/core': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/core@192'
  '@meowdown/react': 'https://pkg.pr.new/prosekit/meowdown/@meowdown/react@192'
